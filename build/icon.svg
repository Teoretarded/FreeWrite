<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#bg)"/>
  <!-- top sheen -->
  <rect x="0" y="0" width="256" height="160" rx="58" fill="url(#sheen)"/>
  <!-- subtle inner ring -->
  <rect x="6" y="6" width="244" height="244" rx="52" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

  <!-- long shadow: cohesive pilcrow silhouette, offset down-right -->
  <g transform="translate(7,8)" fill="#312E81" fill-opacity="0.42">
    <rect x="108" y="112" width="18" height="89" rx="9"/>
    <path d="M134 56 A30 30 0 0 0 134 116 Z"/>
    <rect x="134" y="56" width="18" height="145" rx="9"/>
  </g>

  <!-- green descender (open-source nod) -->
  <rect x="108" y="112" width="18" height="89" rx="9" fill="#34D399"/>
  <!-- bowl: left half-disc, flush against the stem -->
  <path d="M134 56 A30 30 0 0 0 134 116 Z" fill="#ffffff"/>
  <!-- main stem -->
  <rect x="134" y="56" width="18" height="145" rx="9" fill="#ffffff"/>
</svg>
